name: Preview PR

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # needed for Workload Identity Federation
      pull-requests: write  # needed to post preview comment

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install function dependencies
      run: npm ci --prefix functions

    - name: Build project
      run: npm run build
      env:
        BUILD_VERSION: ${{ github.sha }}
        VITE_AI_PROXY_URL: ${{ secrets.AI_PROXY_URL }}
        VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Deploy to Firebase Hosting preview channel
      id: deploy
      run: |
        OUTPUT=$(npx firebase-tools hosting:channel:deploy pr-${{ github.event.number }} \
          --project football-team-picker-mh \
          --expires 7d \
          --non-interactive 2>&1)
        echo "$OUTPUT"
        URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9-]+--pr-[a-z0-9-]+\.web\.app' | head -1)
        echo "url=${URL}" >> $GITHUB_OUTPUT

    - name: Post or update preview comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request.number;
          const url = '${{ steps.deploy.outputs.url }}';
          const body = url
            ? `🔍 **Preview:** ${url}\n\n_Updated ${new Date().toUTCString()}_`
            : `🔍 **Preview:** deploy succeeded but URL not captured. Check the [Actions log](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
          const marker = '🔍 **Preview:**';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr,
          });

          const existing = comments.find(c => c.body.startsWith(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body,
            });
          }
