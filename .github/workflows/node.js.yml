name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  # ── CI gate (typecheck + lint + tests) ───────────────────────────────────
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: TypeScript check
      run: npx tsc --noEmit

    - name: Lint
      run: npm run lint

    - name: Tests
      run: npm test

  # ── Build & deploy to Firebase Hosting + Functions ──────────────────────
  build-and-deploy:
    needs: check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        BUILD_VERSION: ${{ github.sha }}
        VITE_AI_PROXY_URL: ${{ secrets.AI_PROXY_URL }}
        VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    - name: Install functions dependencies
      run: cd functions && npm ci

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    - name: Deploy to Firebase Hosting & Functions
      run: npx firebase-tools deploy --only hosting,functions --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}"
