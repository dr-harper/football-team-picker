<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
  <meta name="theme-color" content="#14532d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Team Shuffle</title>

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Team Shuffle" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Team Shuffle" />

</head>

<body>
  <script>
    // Restore path from GitHub Pages 404 redirect
    (function() {
      var p = new URLSearchParams(window.location.search).get('p');
      if (p) {
        window.history.replaceState(null, '', decodeURIComponent(p));
      }
    })();

    document.documentElement.classList.add('dark');
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
    }
  </script>
</body>

</html>
