<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #0f1923;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 55px 70px;
    position: relative;
  }

  .bg-pitch {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background:
      radial-gradient(circle at 50% 50%, transparent 80px, #4ade80 80px, #4ade80 82px, transparent 82px),
      linear-gradient(to right, transparent calc(50% - 1px), #4ade80 calc(50% - 1px), #4ade80 calc(50% + 1px), transparent calc(50% + 1px));
  }

  .accent {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 8px;
    background: linear-gradient(to bottom, #4ade80, #16a34a);
    border-radius: 0 4px 4px 0;
  }

  .left {
    flex: 0 0 420px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .logo-icon { font-size: 48px; line-height: 1; }

  .brand {
    font-size: 46px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1px;
  }

  .tagline {
    font-size: 20px;
    color: #94a3b8;
    font-weight: 400;
    margin-bottom: 10px;
  }

  .features { display: flex; flex-direction: column; gap: 12px; }

  .feature { display: flex; align-items: center; gap: 14px; }

  .feature-icon {
    width: 40px;
    height: 40px;
    background: rgba(74, 222, 128, 0.12);
    border: 1px solid rgba(74, 222, 128, 0.25);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .feature-text { font-size: 19px; color: #e2e8f0; font-weight: 500; }

  /* Pitch */
  .right {
    flex: 1;
    height: 350px;
    margin-left: 50px;
  }

  .pitch {
    width: 100%;
    height: 100%;
    background: #16a34a;
    border-radius: 16px;
    border: 3px solid rgba(255,255,255,0.15);
    position: relative;
    overflow: hidden;
  }

  /* Pitch markings */
  .centre-line {
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 2px;
    background: rgba(255,255,255,0.3);
    transform: translateX(-50%);
  }

  .centre-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .centre-spot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }

  .goal-box {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 42px; height: 110px;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .goal-box.left  { left: 0;  border-left: none; }
  .goal-box.right { right: 0; border-right: none; }

  .penalty-spot {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }
  .penalty-spot.left  { left: 13%; }
  .penalty-spot.right { right: 13%; }

  /* Team labels */
  .team-label {
    position: absolute;
    top: 18px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .team-label.a { left: 25%; transform: translateX(-50%); }
  .team-label.b { left: 75%; transform: translateX(-50%); }

  /* Shirt positions — absolute layout on the pitch */
  /* Team A (left side): GK at far left, 2 DEF rows in left half */
  /* Team B (right side): GK at far right, 2 DEF rows in right half */

  .shirt {
    position: absolute;
    width: 48px;
    height: 48px;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  /* GK positions: near own goal line */
  .gk-a { left: 8%; top: 50%; }
  .gk-b { left: 92%; top: 50%; }

  /* Team A outfield: spread across left half */
  .a1 { left: 25%; top: 28%; }
  .a2 { left: 25%; top: 72%; }
  .a3 { left: 42%; top: 38%; }
  .a4 { left: 42%; top: 62%; }

  /* Team B outfield: spread across right half */
  .b1 { left: 75%; top: 28%; }
  .b2 { left: 75%; top: 72%; }
  .b3 { left: 58%; top: 38%; }
  .b4 { left: 58%; top: 62%; }

  .url {
    position: absolute;
    bottom: 26px;
    left: 70px;
    font-size: 15px;
    color: #4ade80;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
